<div class="auth-container">
  <div class="auth-card">
    <h2>AI Dashboard</h2>
    <p class="subtitle">Create your account</p>

    <div class="error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="harry" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="harry@test.com" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <p class="switch">Already have an account? <a routerLink="/login">Sign In</a></p>
  </div>
</div>
